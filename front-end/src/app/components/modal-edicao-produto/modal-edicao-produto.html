<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
  <div class="bg-white rounded-lg shadow-xl w-full max-w-lg p-6">
    
    <div class="flex justify-between items-center border-b pb-3 mb-4">
      <h3 class="text-lg font-bold text-gray-900">Editar Produto</h3>
      <button (click)="fecharModal()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
    </div>

    <form [formGroup]="produtoForm" (ngSubmit)="salvar()" class="space-y-4">
      
      <div>
        <label class="block text-sm font-medium text-gray-700">Nome do Produto</label>
        <input type="text" formControlName="nome" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2.5 border text-sm">
        <span *ngIf="produtoForm.get('nome')?.touched && produtoForm.get('nome')?.invalid" class="text-xs text-red-500 mt-1 block">O nome é obrigatório.</span>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Tipo / Categoria</label>
        <select formControlName="tipo" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2.5 border text-sm bg-white">
          <option value="" disabled>Selecione uma categoria...</option>
          <option *ngFor="let tipo of tiposDeProdutos" [value]="tipo">{{ tipo }}</option>
        </select>
        <span *ngIf="produtoForm.get('tipo')?.touched && produtoForm.get('tipo')?.invalid" class="text-xs text-red-500 mt-1 block">A categoria é obrigatória.</span>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Preço Unitário</label>
          <input type="number" step="0.01" formControlName="precoUnitario" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2.5 border text-sm">
          <span *ngIf="produtoForm.get('precoUnitario')?.touched && produtoForm.get('precoUnitario')?.invalid" class="text-xs text-red-500 mt-1 block">Valor mínimo de 0.01.</span>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Qtd em Estoque</label>
          <input type="number" formControlName="quantidadeEmEstoque" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2.5 border text-sm">
          <span *ngIf="produtoForm.get('quantidadeEmEstoque')?.touched && produtoForm.get('quantidadeEmEstoque')?.invalid" class="text-xs text-red-500 mt-1 block">Mínimo de 0 itens.</span>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Descrição do Produto</label>
        <textarea formControlName="descricao" rows="3" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2.5 border text-sm" placeholder="Detalhes do produto..."></textarea>
        <span *ngIf="produtoForm.get('descricao')?.touched && produtoForm.get('descricao')?.invalid" class="text-xs text-red-500 mt-1 block">A descrição é obrigatória.</span>
      </div>

      <div class="flex justify-end space-x-3 pt-4 border-t">
        <button type="button" (click)="fecharModal()" class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-md">Cancelar</button>
        <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-md shadow-sm">Salvar Alterações</button>
      </div>

    </form>
  </div>
</div>
